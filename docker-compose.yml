services:
  web:
    image: nginx:alpine
    container_name: home-frontend-estv
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - caddy_net
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: home-backend-estv
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - caddy_net
    environment:
      - PORT=8080
      - CACHE_TTL=${CACHE_TTL:-60}
      - CHECK_TIMEOUT=${CHECK_TIMEOUT:-5000}
    volumes:
      - ./config.json:/app/config.json:ro

networks:
  caddy_net:
    external: true
