services:
  web:
    image: nginx:alpine
    container_name: home-estv
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3002}:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: home-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3003}:3000"
    environment:
      - PORT=3000
      - CACHE_TTL=${CACHE_TTL:-60}
      - CHECK_TIMEOUT=${CHECK_TIMEOUT:-5000}
    volumes:
      - ./config.json:/app/config.json:ro
