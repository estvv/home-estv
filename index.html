<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTV Cloud Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            50% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }
        .pulse-online {
            animation: pulse-green 2s infinite;
        }
        .pulse-offline {
            animation: pulse-red 2s infinite;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .glass-card:hover {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(148, 163, 184, 0.2);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .icon-gradient-violet { background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(168, 85, 247, 0.2)); }
        .icon-gradient-cyan { background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(20, 184, 166, 0.2)); }
        .icon-gradient-amber { background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(251, 191, 36, 0.2)); }
        .icon-gradient-rose { background: linear-gradient(135deg, rgba(244, 63, 94, 0.2), rgba(251, 113, 133, 0.2)); }
        .icon-gradient-emerald { background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(52, 211, 153, 0.2)); }
        .icon-gradient-blue { background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(96, 165, 250, 0.2)); }
    </style>
</head>
<body class="text-slate-200 antialiased">
    <div class="min-h-screen flex flex-col items-center justify-center px-4 py-12">
        <header class="text-center mb-12">
            <h1 id="siteTitle" class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent mb-3">
                Loading...
            </h1>
            <p id="siteSubtitle" class="text-slate-400 text-lg"></p>
        </header>

        <div id="servicesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl w-full">
        </div>

        <footer class="mt-12 text-slate-500 text-sm">
            <p>Last updated: <span id="lastUpdate">--</span></p>
        </footer>
    </div>

    <script>
        const icons = {
            brain: {
                svg: `<svg class="w-8 h-8 text-violet-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 4.5a7.5 7.5 0 1 0 7.5 7.5"/>
                    <path d="M12 4.5a7.5 7.5 0 0 1 7.5 7.5"/>
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 4.5V2"/>
                    <path d="M19.5 12h2.5"/>
                    <path d="M12 19.5V22"/>
                    <path d="M4.5 12H2"/>
                </svg>`,
                gradient: 'icon-gradient-violet'
            },
            monitor: {
                svg: `<svg class="w-8 h-8 text-cyan-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                    <circle cx="6.5" cy="6.5" r="1.5"/>
                    <circle cx="17.5" cy="6.5" r="1.5"/>
                    <circle cx="6.5" cy="17.5" r="1.5"/>
                    <circle cx="17.5" cy="17.5" r="1.5"/>
                </svg>`,
                gradient: 'icon-gradient-cyan'
            },
            cloud: {
                svg: `<svg class="w-8 h-8 text-blue-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
                </svg>`,
                gradient: 'icon-gradient-blue'
            },
            database: {
                svg: `<svg class="w-8 h-8 text-amber-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <ellipse cx="12" cy="5" rx="9" ry="3"/>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                    <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>
                </svg>`,
                gradient: 'icon-gradient-amber'
            },
            code: {
                svg: `<svg class="w-8 h-8 text-emerald-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 18 22 12 16 6"/>
                    <polyline points="8 6 2 12 8 18"/>
                    <line x1="12" y1="2" x2="12" y2="22"/>
                </svg>`,
                gradient: 'icon-gradient-emerald'
            },
            server: {
                svg: `<svg class="w-8 h-8 text-rose-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="8" rx="2"/>
                    <rect x="2" y="14" width="20" height="8" rx="2"/>
                    <line x1="6" y1="6" x2="6.01" y2="6"/>
                    <line x1="6" y1="18" x2="6.01" y2="18"/>
                </svg>`,
                gradient: 'icon-gradient-rose'
            }
        };

        let config = null;

        function createServiceCard(service) {
            const icon = icons[service.icon] || icons.cloud;
            const card = document.createElement('a');
            card.href = service.url;
            card.target = '_blank';
            card.rel = 'noopener noreferrer';
            card.className = 'service-card glass-card rounded-2xl p-6 transition-all duration-300 transform hover:scale-[1.02] hover:-translate-y-1 block';
            card.setAttribute('data-service-id', service.id);

            card.innerHTML = `
                <div class="flex items-start justify-between mb-4">
                    <div class="p-3 rounded-xl ${icon.gradient}">
                        ${icon.svg}
                    </div>
                    <div class="status-indicator" data-service="${service.id}">
                        <span class="checking flex items-center gap-2 text-slate-400 text-sm">
                            <span class="w-2.5 h-2.5 rounded-full bg-slate-500"></span>
                            Checking...
                        </span>
                        <span class="online hidden flex items-center gap-2 text-green-400 text-sm">
                            <span class="w-2.5 h-2.5 rounded-full bg-green-500 pulse-online"></span>
                            Online
                        </span>
                        <span class="offline hidden flex items-center gap-2 text-red-400 text-sm">
                            <span class="w-2.5 h-2.5 rounded-full bg-red-500 pulse-offline"></span>
                            Offline
                        </span>
                    </div>
                </div>
                <h2 class="text-xl font-semibold text-white mb-2">${service.name}</h2>
                <p class="text-slate-400 text-sm">${service.description}</p>
            `;

            return card;
        }

        function updateStatusUI(serviceId, status) {
            const indicator = document.querySelector(`[data-service="${serviceId}"]`);
            if (!indicator) return;

            const checking = indicator.querySelector('.checking');
            const online = indicator.querySelector('.online');
            const offline = indicator.querySelector('.offline');

            checking.classList.add('hidden');
            online.classList.add('hidden');
            offline.classList.add('hidden');

            if (status === 'online') {
                online.classList.remove('hidden');
            } else if (status === 'offline') {
                offline.classList.remove('hidden');
            } else {
                checking.classList.remove('hidden');
            }
        }

        function checkServiceStatus(service) {
            const timestamp = Date.now();
            const checkUrl = service.checkUrl || `${service.url}/favicon.ico`;
            const imgUrl = `${checkUrl}?t=${timestamp}`;

            return new Promise((resolve) => {
                const img = new Image();
                const timeout = setTimeout(() => {
                    img.onload = null;
                    img.onerror = null;
                    resolve('offline');
                }, 5000);

                img.onload = () => {
                    clearTimeout(timeout);
                    resolve('online');
                };

                img.onerror = () => {
                    clearTimeout(timeout);
                    resolve('offline');
                };

                img.src = imgUrl;
            });
        }

        async function checkAllServices() {
            if (!config || !config.services) return;

            const results = await Promise.all(
                config.services.map(async (service) => {
                    const status = await checkServiceStatus(service);
                    return { id: service.id, status };
                })
            );

            results.forEach(({ id, status }) => {
                updateStatusUI(id, status);
            });

            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString();
        }

        async function loadConfig() {
            try {
                const response = await fetch('config.json');
                config = await response.json();

                document.getElementById('siteTitle').textContent = config.site.title;
                document.getElementById('siteSubtitle').textContent = config.site.subtitle;

                const grid = document.getElementById('servicesGrid');
                grid.innerHTML = '';

                config.services.forEach(service => {
                    const card = createServiceCard(service);
                    grid.appendChild(card);
                });

                checkAllServices();
            } catch (error) {
                document.getElementById('siteTitle').textContent = 'Error Loading Config';
                console.error('Failed to load config:', error);
            }
        }

        loadConfig();

        setInterval(checkAllServices, 5000);
    </script>
</body>
</html>
