<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); }
            50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
            50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
        }
        .pulse-online {
            animation: pulse-green 2s infinite;
        }
        .pulse-offline {
            animation: pulse-red 2s infinite;
        }
    </style>
</head>
<body class="bg-white text-neutral-500 antialiased min-h-screen">
    <div class="max-w-2xl mx-auto px-6 py-16">
        <header class="mb-16 text-center">
            <h1 class="text-2xl font-bold text-black mb-1">Home</h1>
            <p class="text-xs text-neutral-400 mt-1 font-mono">{{GIT_HASH}}</p>
            <p id="siteSubtitle" class="text-neutral-400 text-sm"></p>
        </header>

        <div id="servicesList" class="space-y-3">
        </div>

        <footer class="mt-16 text-neutral-400 text-xs text-center">
            <p>Last updated: <span id="lastUpdate">--</span></p>
            <p class="mt-1">Version: <span id="gitHash">--</span></p>
        </footer>
    </div>

    <script>
        let config = null;

        async function loadVersion() {
            try {
                const response = await fetch('version.json');
                const data = await response.json();
                document.getElementById('gitHash').textContent = data.gitHash || 'unknown';
            } catch (error) {
                document.getElementById('gitHash').textContent = 'unknown';
            }
        }

        function createServiceRow(service) {
            const row = document.createElement('a');
            row.href = service.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';
            row.className = 'flex items-center justify-between py-3 px-4 rounded-lg border border-neutral-200 hover:bg-neutral-50 transition-colors duration-150';
            row.setAttribute('data-service-id', service.id);

            row.innerHTML = `
                <div class="flex-1 min-w-0">
                    <div class="text-black text-sm font-medium">${service.name}</div>
                    <div class="text-neutral-400 text-xs mt-0.5">${service.url.replace('https://', '')}</div>
                </div>
                <div class="status-indicator ml-4" data-service="${service.id}">
                    <span class="checking flex items-center gap-2 text-neutral-400 text-xs">
                        <span class="w-2 h-2 rounded-full bg-neutral-300"></span>
                        Checking
                    </span>
                    <span class="online hidden flex items-center gap-2 text-green-600 text-xs">
                        <span class="w-2 h-2 rounded-full bg-green-500 pulse-online"></span>
                        Online
                    </span>
                    <span class="offline hidden flex items-center gap-2 text-red-600 text-xs">
                        <span class="w-2 h-2 rounded-full bg-red-500 pulse-offline"></span>
                        Offline
                    </span>
                </div>
            `;

            return row;
        }

        function updateStatusUI(serviceId, status) {
            const indicator = document.querySelector(`[data-service="${serviceId}"]`);
            if (!indicator) return;

            const checking = indicator.querySelector('.checking');
            const online = indicator.querySelector('.online');
            const offline = indicator.querySelector('.offline');

            checking.classList.add('hidden');
            online.classList.add('hidden');
            offline.classList.add('hidden');

            if (status === 'online') {
                online.classList.remove('hidden');
            } else if (status === 'offline') {
                offline.classList.remove('hidden');
            } else {
                checking.classList.remove('hidden');
            }
        }

        function checkServiceStatus(service) {
            const timestamp = Date.now();
            const checkUrl = service.checkUrl || `${service.url}/favicon.ico`;
            const imgUrl = `${checkUrl}?t=${timestamp}`;

            return new Promise((resolve) => {
                const img = new Image();
                const timeout = setTimeout(() => {
                    img.onload = null;
                    img.onerror = null;
                    resolve('offline');
                }, 5000);

                img.onload = () => {
                    clearTimeout(timeout);
                    resolve('online');
                };

                img.onerror = () => {
                    clearTimeout(timeout);
                    resolve('offline');
                };

                img.src = imgUrl;
            });
        }

        async function checkAllServices() {
            if (!config || !config.services) return;

            const results = await Promise.all(
                config.services.map(async (service) => {
                    const status = await checkServiceStatus(service);
                    return { id: service.id, status };
                })
            );

            results.forEach(({ id, status }) => {
                updateStatusUI(id, status);
            });

            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString();
        }

        async function loadConfig() {
            try {
                const response = await fetch('config.json');
                config = await response.json();

                document.getElementById('siteSubtitle').textContent = config.site.subtitle;

                const list = document.getElementById('servicesList');
                list.innerHTML = '';

                config.services.forEach(service => {
                    const row = createServiceRow(service);
                    list.appendChild(row);
                });

                checkAllServices();
            } catch (error) {
                console.error('Failed to load config:', error);
            }
        }

        loadConfig();
        loadVersion();

        setInterval(checkAllServices, 5000);
    </script>
</body>
</html>
